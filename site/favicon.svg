<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" role="img" aria-label="Printer's device: the rhombicuboctahedron of the 1495 Pacioli portrait, line-art in a double ring">
  <!-- the glass solid of the portrait, drawn as the face-on projection:
       outer octagon silhouette, front square face, eight connecting edges -->
  <circle cx="100" cy="100" r="97" fill="#f3ead7" stroke="#2b2118" stroke-width="2"/>
  <circle cx="100" cy="100" r="90" fill="none" stroke="#2b2118" stroke-width="1"/>
  <g stroke="#2b2118" stroke-width="2.2" fill="none" stroke-linejoin="miter">
    <!-- octagon silhouette -->
    <polygon points="167.2,127.8 127.8,167.2 72.2,167.2 32.8,127.8 32.8,72.2 72.2,32.8 127.8,32.8 167.2,72.2"/>
    <!-- front square face -->
    <rect x="70" y="70" width="60" height="60"/>
    <!-- edges: square corners to nearest silhouette vertices -->
    <path d="M130,70 L167.2,72.2 M130,70 L127.8,32.8"/>
    <path d="M70,70 L32.8,72.2 M70,70 L72.2,32.8"/>
    <path d="M130,130 L167.2,127.8 M130,130 L127.8,167.2"/>
    <path d="M70,130 L32.8,127.8 M70,130 L72.2,167.2"/>
  </g>
  <!-- the hanging thread of the portrait -->
  <line x1="100" y1="10" x2="100" y2="32.8" stroke="#8b1a1a" stroke-width="1.4"/>
</svg>
