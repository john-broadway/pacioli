name: CI

on:
  push:
    branches: [main]
  pull_request:

# Explicit read-only floor.
permissions:
  contents: read

jobs:
  broker-test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install broker (with the MCP + A2A doors) + pytest
        working-directory: broker
        run: python -m pip install -e '.[server,a2a]' pytest
      - name: Test broker
        working-directory: broker
        run: python -m pytest pacioli/tests -q -ra

  guard-test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install guard (pure decision logic, zero deps) + pytest
        working-directory: guard
        run: python -m pip install -e . pytest
      - name: Test guard
        working-directory: guard
        run: python -m pytest pacioli_guard/tests -q -ra

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.12"
      - name: Install ruff
        run: python -m pip install ruff
      - name: Lint (config in ruff.toml — repo-root, covers broker/ + guard/)
        run: ruff check .

  version-consistency:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.12"   # version_tools uses tomllib (stdlib >=3.11)
      - name: Version drift gate (single-source across broker + guard)
        run: python scripts/version_tools.py check
      - name: Version-tools unit + drift tests
        run: |
          python -m pip install pytest
          python -m pytest scripts/tests -q -ra

  pip-audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.12"
      - name: Audit the broker [server,a2a] dependency closure (pure cores have no deps)
        working-directory: broker
        run: |
          python -m pip install -e '.[server,a2a]'
          # Freeze the closure BEFORE pip-audit's own deps land, and drop the editable self.
          python -m pip freeze | grep -vE '^-e |pacioli' > deps.txt
          python -m pip install pip-audit
          pip-audit -r deps.txt

  gitleaks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          fetch-depth: 0   # full history so gitleaks scans commits, not just the tree
      - name: Scan for committed secrets
        uses: gitleaks/gitleaks-action@e0c47f4f8be36e29cdc102c57e68cb5cbf0e8d1e # v3
        # Free for individual accounts. GITHUB_TOKEN is required to scan pull requests.
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
