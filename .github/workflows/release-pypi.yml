name: Release — PyPI (Trusted Publishing)

# Tokenless publish to PyPI via OIDC, gated behind the `pypi` Environment's
# required-reviewer rule (John approves before anything goes public).
# Two packages, one repo — the tag picks the package:
#   v*        -> broker/  (PyPI: pacioli)
#   guard-v*  -> guard/   (PyPI: pacioli-guard)
#   - real release: when a GitHub Release is published
#   - dry run:      workflow_dispatch -> TestPyPI (prove the OIDC path first)
# (Same rail as Proximo's release-pypi.yml; SBOM + signed build-provenance included 2026-07-18.)
on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      package:
        description: "Which package"
        required: true
        default: broker
        type: choice
        options: [broker, guard]
      target:
        description: "Where to publish"
        required: true
        default: testpypi
        type: choice
        options: [testpypi, pypi]

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write      # gh release upload of the SBOM + signed provenance
      id-token: write      # OIDC — keyless (sigstore) signing of the release provenance
      attestations: write  # record the build-provenance attestation
    outputs:
      pkgdir: ${{ steps.pick.outputs.pkgdir }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.12"

      - name: Pick the package from the tag (or the dispatch input)
        id: pick
        run: |
          if [ "${{ github.event_name }}" = "release" ]; then
            case "$GITHUB_REF_NAME" in
              guard-v*) echo "pkgdir=guard"  >> "$GITHUB_OUTPUT" ;;
              v*)       echo "pkgdir=broker" >> "$GITHUB_OUTPUT" ;;
              *) echo "XX unrecognized tag '$GITHUB_REF_NAME' (want v* or guard-v*)"; exit 1 ;;
            esac
          else
            echo "pkgdir=${{ inputs.package }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Verify tag == pyproject version (real releases only)
        if: github.event_name == 'release'
        run: |
          PKGDIR=${{ steps.pick.outputs.pkgdir }}
          TAGVER="${GITHUB_REF_NAME#guard-}"; TAGVER="${TAGVER#v}"
          python - "$PKGDIR" "$TAGVER" <<'EOF'
          import sys, tomllib
          pkgdir, tagver = sys.argv[1], sys.argv[2]
          ver = tomllib.load(open(f"{pkgdir}/pyproject.toml", "rb"))["project"]["version"]
          assert ver == tagver, f"XX tag {tagver} != {pkgdir}/pyproject version {ver}"
          print(f"ok {pkgdir} {ver}")
          EOF

      - name: Build sdist + wheel
        run: |
          python -m pip install build
          cd ${{ steps.pick.outputs.pkgdir }} && python -m build

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: dist
          path: ${{ steps.pick.outputs.pkgdir }}/dist/

      # Receipts: a CycloneDX SBOM for the published wheel. The pure cores are zero-dep, so the
      # base wheel's SBOM is minimal BY DESIGN — the MCP/A2A doors are OPTIONAL extras, not base
      # deps; the SBOM documents exactly what a plain `pip install` pulls. The generator runs in
      # the runner's system python and only INTROSPECTS the wheel-only venv, so it never pollutes
      # the SBOM with its own dependency tree.
      - name: Generate CycloneDX SBOM for the wheel
        env:
          PKGDIR: ${{ steps.pick.outputs.pkgdir }}
        run: |
          set -e
          VER="${GITHUB_REF_NAME#guard-}"; VER="${VER#v}"
          [ "$PKGDIR" = "guard" ] && PKG=pacioli-guard || PKG=pacioli
          python -m venv /tmp/sbom-env
          /tmp/sbom-env/bin/pip install --quiet --no-deps "$PKGDIR"/dist/*.whl
          python -m pip install --quiet cyclonedx-bom
          mkdir -p sbom
          python -m cyclonedx_py environment --of JSON \
            -o "sbom/${PKG}-${VER}-sbom.cdx.json" /tmp/sbom-env/bin/python

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: sbom
          path: sbom/

      - name: Attach SBOM to the GitHub release (real releases only)
        if: github.event_name == 'release'
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release upload "$GITHUB_REF_NAME" sbom/*.cdx.json --clobber

      # PROVE at the artifact layer: a sigstore-signed build-provenance attestation over the exact
      # sdist + wheel that ship. Verifiable with `gh attestation verify <file> --owner john-broadway`.
      # Named *.intoto.jsonl so OpenSSF Scorecard's Signed-Releases check recognizes it.
      - name: Attest build provenance for the release artifacts (real releases only)
        if: github.event_name == 'release'
        id: attest
        uses: actions/attest-build-provenance@0f67c3f4856b2e3261c31976d6725780e5e4c373 # v4
        with:
          subject-path: ${{ steps.pick.outputs.pkgdir }}/dist/*

      - name: Attach signed provenance to the GitHub release (real releases only)
        if: github.event_name == 'release'
        env:
          GH_TOKEN: ${{ github.token }}
          BUNDLE: ${{ steps.attest.outputs.bundle-path }}
          PKGDIR: ${{ steps.pick.outputs.pkgdir }}
        run: |
          set -e
          VER="${GITHUB_REF_NAME#guard-}"; VER="${VER#v}"
          [ "$PKGDIR" = "guard" ] && PKG=pacioli-guard || PKG=pacioli
          cp "$BUNDLE" "${PKG}-${VER}.intoto.jsonl"
          gh release upload "$GITHUB_REF_NAME" "${PKG}-${VER}.intoto.jsonl" --clobber

  publish-testpypi:
    needs: build
    if: github.event_name == 'workflow_dispatch' && inputs.target == 'testpypi'
    runs-on: ubuntu-latest
    environment: testpypi
    permissions:
      id-token: write   # OIDC — no token/secret
    steps:
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: dist
          path: dist/
      - uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # release/v1
        with:
          repository-url: https://test.pypi.org/legacy/

  publish-pypi:
    needs: build
    if: github.event_name == 'release' || (github.event_name == 'workflow_dispatch' && inputs.target == 'pypi')
    runs-on: ubuntu-latest
    environment: pypi    # required-reviewer rule pauses here for John's approval
    permissions:
      id-token: write    # OIDC — no token/secret
    steps:
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: dist
          path: dist/
      - uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # release/v1
